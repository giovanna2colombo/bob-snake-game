<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob's Snake Game 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
        }

        #gameCanvas {
            border: 4px solid white;
            border-radius: 10px;
            background-color: #2d3748;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            font-size: 1.1em;
        }

        .controls p {
            margin: 5px 0;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
        }

        .game-over h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-over button:hover {
            transform: scale(1.1);
        }

        .emoji {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🤖 Bob's Snake Game 🐍</h1>
        <div class="score-board">
            Score: <span id="score">0</span> | High Score: <span id="highScore">0</span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>⬆️ Arrow Up | ⬇️ Arrow Down | ⬅️ Arrow Left | ➡️ Arrow Right</p>
            <p>Or use: W, A, S, D keys</p>
            <p class="emoji">Help Robot Bob collect bobcoins 🪙 to grow! 🤖</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Game Over! 💀</h2>
        <p style="font-size: 1.5em;">Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again 🎮</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        // Game settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // Game state
        let snake = [{ x: 10, y: 10 }];
        let dx = 0;
        let dy = 0;
        let food = { x: 15, y: 15 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop;

        highScoreElement.textContent = highScore;

        // Draw Bob's face (snake head) - Robot with blue helmet!
        function drawBobFace(x, y) {
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;
            const size = gridSize - 4;

            // Robot head (light gray/white)
            ctx.fillStyle = '#E8E8E8';
            ctx.fillRect(x * gridSize + 2, y * gridSize + 6, size, size - 4);
            
            // Blue helmet top
            ctx.fillStyle = '#5B8FD8';
            ctx.fillRect(x * gridSize + 2, y * gridSize + 2, size, 6);
            
            // Helmet stripe (darker blue)
            ctx.fillStyle = '#4A7BC2';
            ctx.fillRect(x * gridSize + 2, y * gridSize + 4, size, 2);
            
            // Helmet center line
            ctx.fillStyle = '#3D6AA8';
            ctx.fillRect(centerX - 1, y * gridSize + 2, 2, 6);
            
            // Eyes (cute robot eyes)
            ctx.fillStyle = '#2C3E50';
            ctx.fillRect(x * gridSize + 6, y * gridSize + 10, 3, 3);
            ctx.fillRect(x * gridSize + 11, y * gridSize + 10, 3, 3);
            
            // Eye shine (white dots)
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(x * gridSize + 7, y * gridSize + 11, 1, 1);
            ctx.fillRect(x * gridSize + 12, y * gridSize + 11, 1, 1);
            
            // Mouth (robot smile)
            ctx.fillStyle = '#2C3E50';
            ctx.fillRect(x * gridSize + 6, y * gridSize + 15, 8, 1);
            ctx.fillRect(x * gridSize + 6, y * gridSize + 15, 1, 2);
            ctx.fillRect(x * gridSize + 13, y * gridSize + 15, 1, 2);
            
            // Antenna (optional cute detail)
            ctx.fillStyle = '#5B8FD8';
            ctx.fillRect(centerX - 0.5, y * gridSize + 1, 1, 2);
            ctx.beginPath();
            ctx.arc(centerX, y * gridSize + 0.5, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw snake body
        function drawSnakeBody(x, y) {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x * gridSize + 1, y * gridSize + 1, gridSize - 2, gridSize - 2);
            ctx.strokeStyle = '#45a049';
            ctx.strokeRect(x * gridSize + 1, y * gridSize + 1, gridSize - 2, gridSize - 2);
        }

        // Draw bobcoin (food)
        function drawBobcoin(x, y) {
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;
            const radius = gridSize / 2 - 2;

            // Coin circle
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // Coin border
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();

            // "B" letter
            ctx.fillStyle = '#FFA500';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('B', centerX, centerY);
        }

        // Generate random food position
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Make sure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    drawBobFace(snake[i].x, snake[i].y);
                } else {
                    drawSnakeBody(snake[i].x, snake[i].y);
                }
            }

            // Draw food
            drawBobcoin(food.x, food.y);
        }

        // Update game state
        function update() {
            if (!gameRunning) return;

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = score;
                generateFood();
                
                // Update high score
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
            } else {
                snake.pop();
            }
        }

        // Game loop
        function gameStep() {
            update();
            draw();
        }

        // End game
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        // Restart game
        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            generateFood();
            gameOverElement.style.display = 'none';
            gameRunning = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, 100);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            // Prevent default arrow key behavior
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }

            // Start game on first key press
            if (!gameRunning && (dx === 0 && dy === 0)) {
                gameRunning = true;
                gameLoop = setInterval(gameStep, 100);
            }

            // Change direction (prevent 180-degree turns)
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && dy === 0) {
                dx = 0;
                dy = -1;
            } else if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && dy === 0) {
                dx = 0;
                dy = 1;
            } else if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && dx === 0) {
                dx = -1;
                dy = 0;
            } else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && dx === 0) {
                dx = 1;
                dy = 0;
            }
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
